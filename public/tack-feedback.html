<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tack för din feedback | Snabbrev</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f9f8f6;--s:#fff;--b:#e5e3de;--t:#1a1a18;--m:#6b6963;--a:#2d6a4f;--ah:#245a42;--al:#e8f5ee}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--t);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
    .card{background:var(--s);border:1px solid var(--b);border-radius:16px;padding:48px 40px;max-width:420px;width:100%}
    .icon{font-size:48px;margin-bottom:20px}
    h1{font-size:24px;font-weight:700;margin-bottom:12px}
    p{font-size:15px;color:var(--m);line-height:1.7;margin-bottom:24px}
    .btn{display:inline-block;background:var(--a);color:#fff;font-weight:600;font-size:15px;padding:12px 28px;border-radius:10px;text-decoration:none}
    .btn:hover{background:var(--ah)}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="icon">🙏</div>
    <h1 id="heading">Tack för din feedback!</h1>
    <p id="msg">Det hjälper oss att bli bättre. Hoppas att ansökan gick bra!</p>
    <a class="btn" href="/">Generera ett nytt brev</a>
  </div>
  <script>
    const rating = new URLSearchParams(location.search).get('rating');
    if (rating >= 4) {
      document.getElementById('icon').textContent = '🎉';
      document.getElementById('heading').textContent = 'Kul att höra!';
      document.getElementById('msg').textContent = 'Glad att brevet föll i smaken. Tipsa gärna en vän om Snabbrev — det hjälper oss enormt.';
    } else if (rating <= 2) {
      document.getElementById('icon').textContent = '😔';
      document.getElementById('heading').textContent = 'Tack för ärligheten';
      document.getElementById('msg').textContent = 'Vi tar det till oss och jobbar på att bli bättre. Hör gärna av dig till hej@snabbrev.se om du vill berätta mer.';
    }
  </script>
</body>
</html>
